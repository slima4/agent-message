site_name: agent-message
site_description: Reference implementation of SAMP (Simple Agent Message Protocol)
site_url: https://slima4.github.io/agent-message/
repo_url: https://github.com/slima4/agent-message
repo_name: slima4/agent-message
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/weather-night
        name: Light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Install: install.md
  - Use: use.md
  - SAMP Spec: spec.md
  - Design: design.md
  - Limits: limits.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
